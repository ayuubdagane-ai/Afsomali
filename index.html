<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayuub Music Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    padding:20px;
}

.container{
    width:380px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.5);
    color:white;
    animation:fadeIn 1.5s ease;
}

.main-image{
    width:100%;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#dbeafe;
    margin-bottom:15px;
}

audio{
    width:100%;
    margin-top:10px;
    margin-bottom:20px;
}

.payment-box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:20px;
    text-align:center;
    margin-top:10px;
    border:1px solid rgba(255,255,255,0.2);
}

.payment-box h2{
    margin-bottom:15px;
    color:#fff;
}

.name{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#38bdf8;
    margin-bottom:15px;
}

.pay-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#38bdf8;
    color:white;
    font-size:17px;
    cursor:pointer;
    margin-top:12px;
    transition:0.3s;
    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.pay-btn:hover{
    background:#0ea5e9;
    transform:scale(1.03);
}

.pay-logo{
    width:35px;
    height:35px;
    border-radius:50%;
    object-fit:cover;
    background:white;
    padding:2px;
}

.footer{
    margin-top:20px;
    color:#93c5fd;
    font-size:14px;
}

a{
    text-decoration:none;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- IMAGE -->
    <img class="main-image" src="ayuub.jpg" alt="Ayuub Image">

    <!-- TITLE -->
    <h1>AF SOOMAALI</h1>

    <p>FAAH FAAHIN👇🎵</p>

    <!-- AUDIO -->
    <audio id="music" autoplay loop controls>
        <source src="ayuub.mp3" type="audio/mpeg">
    </audio>

    <!-- PAYMENT BOX -->
    <div class="payment-box">

        <div class="name">
            AYUB AHMED MOHAMED
        </div>

        <h2>Lacag Bixin</h2>

        <!-- HORMUUD -->
        <a href="tel:*712*0617485744*3%23">
            <button class="pay-btn">
                <img src="beendiid.jpg" class="pay-logo">
                HORMUUD KU BIXI
            </button>
        </a>

        <!-- GOLIS -->
        <a href="tel:*883*0617485744*3%23">
            <button class="pay-btn">
                <img src="beendiid1.jpg" class="pay-logo">
              GOLIS KU BIXI
            </button>
        </a>

        <!-- TELESOM -->
        <a href="tel:*880*0617485744*3%23">
            <button class="pay-btn">
                <img src="beendiid2.jpg" class="pay-logo">
                TELESOM KU BIXI
            </button>
        </a>

        <!-- TELESOM CASH -->
        <a href="tel:*220*0638778185*33000%23">
            <button class="pay-btn">
                <img src="beendiid2.jpg" class="pay-logo">
                TELESOM CASH
            </button>
        </a>

        <div class="footer">
            RIDWAN MOHAMED UPDY
        </div>

    </div>

</div>

<script>
window.onload = function () {

    let audio = document.getElementById("music");

    // AUTO PLAY
    audio.play().catch(() => {
        document.body.addEventListener("click", () => {
            audio.play();
        }, { once:true });
    });

};
</script>

</body>
</html>
