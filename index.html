<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}

.payment-box{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:30px 22px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.15);
    animation:fade 1s ease;
}

.name{
    font-size:28px;
    font-weight:bold;
    color:#ffffff;
    margin-bottom:10px;
    line-height:1.4;
}

h2{
    color:#93c5fd;
    margin-bottom:25px;
    font-size:22px;
}

a{
    text-decoration:none;
}

.pay-btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:16px;
    margin-bottom:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:15px;
    font-size:17px;
    font-weight:bold;
    color:white;
    transition:0.3s;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.pay-btn:hover{
    transform:scale(1.03);
    background:linear-gradient(90deg,#1d4ed8,#0ea5e9);
}

.pay-logo{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    background:white;
    padding:3px;
}

.footer{
    margin-top:18px;
    font-size:14px;
    color:#cbd5e1;
    letter-spacing:1px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<div class="payment-box">

    <div class="name">
        AYUB AHMED MOHAMED
    </div>

    <h2>Lacag Bixin</h2>

    <!-- HORMUUD -->
    <a href="tel:*712*0617485744*3%23">
        <button class="pay-btn">
            <img src="beendiid.jpg" class="pay-logo">
            HORMUUD KU BIXI
        </button>
    </a>

    <!-- GOLIS -->
    <a href="tel:*883*0617485744*3%23">
        <button class="pay-btn">
            <img src="beendiid1.jpg" class="pay-logo">
            GOLIS KU BIXI
        </button>
    </a>

    <!-- TELESOM -->
    <a href="tel:*880*0617485744*3%23">
        <button class="pay-btn">
            <img src="beendiid2.jpg" class="pay-logo">
            TELESOM KU BIXI
        </button>
    </a>

    <!-- TELESOM CASH -->
    <a href="tel:*220*0638778185*33000%23">
        <button class="pay-btn">
            <img src="beendiid2.jpg" class="pay-logo">
            TELESOM CASH
        </button>
    </a>

    <div class="footer">
        RIDWAN MOHAMED UPDY
    </div>

</div>

</body>
</html>
